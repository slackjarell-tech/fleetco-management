# Nginx config for fleetcomanagement.org on a VPS
# Install: sudo cp deploy/nginx.conf /etc/nginx/sites-available/fleetcomanagement.org
# Enable:  sudo ln -s /etc/nginx/sites-available/fleetcomanagement.org /etc/nginx/sites-enabled/
# Test:    sudo nginx -t && sudo systemctl reload nginx
# SSL:     sudo certbot --nginx -d fleetcomanagement.org -d www.fleetcomanagement.org

upstream fleetco_app {
    server 127.0.0.1:3001;
    keepalive 64;
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name fleetcomanagement.org www.fleetcomanagement.org;
    return 301 https://fleetcomanagement.org$request_uri;
}

# Redirect www → apex
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.fleetcomanagement.org;

    # Certbot will fill these paths after running certbot --nginx
    ssl_certificate     /etc/letsencrypt/live/fleetcomanagement.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fleetcomanagement.org/privkey.pem;

    return 301 https://fleetcomanagement.org$request_uri;
}

# Main site
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name fleetcomanagement.org;

    ssl_certificate     /etc/letsencrypt/live/fleetcomanagement.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fleetcomanagement.org/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 20M;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        proxy_pass         http://fleetco_app;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
