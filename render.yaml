databases:
  - name: fleetco-db
    plan: free
    databaseName: fleetco
    user: fleetco

services:
  - type: web
    name: fleetco-management
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npm run build
    startCommand: node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_ORIGIN
        value: https://fleetcomanagement.org
      - key: VITE_SITE_URL
        value: https://fleetcomanagement.org
      - key: JWT_SECRET
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: fleetco-db
          property: connectionString
      - key: SEED_DEMO_DATA
        value: "false"
      - key: DATA_PATH
        value: /opt/render/project/src/server/data
      - key: GROQ_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: FleetCo Management <info@fleetcomanagement.org>
      - key: PUBLIC_APP_URL
        value: https://fleetcomanagement.org
    disk:
      name: fleetco-data
      mountPath: /opt/render/project/src/server/data
      sizeGB: 1
    healthCheckPath: /api/public-settings
