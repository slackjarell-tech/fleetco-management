databases:
  - name: fleetco-db
    plan: free
    databaseName: fleetco
    user: fleetco

services:
  - type: web
    name: fleetco-management
    runtime: node
    plan: free
    buildCommand: npm run build:render
    startCommand: node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_ORIGIN
        value: https://fleetcomanagement.org
      - key: VITE_SITE_URL
        value: https://fleetcomanagement.org
      - key: JWT_SECRET
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: fleetco-db
          property: connectionString
      - key: SEED_DEMO_DATA
        value: "false"
      - key: DATA_PATH
        value: /opt/render/project/src/server/data
      - key: GROQ_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: FleetCo Management <support@fleetcomanagement.org>
      - key: INQUIRY_TO
        value: support@fleetcomanagement.org
      # Optional: set only when creating the owner account or if password_hash is missing.
      # Remove after first login — it does NOT reset passwords on redeploy.
      - key: OWNER_BOOTSTRAP_PASSWORD
        sync: false
      # One-time only: set to "true" with OWNER_BOOTSTRAP_PASSWORD, deploy once, then remove both.
      - key: OWNER_FORCE_PASSWORD_RESET
        sync: false
      - key: PUBLIC_APP_URL
        value: https://fleetcomanagement.org
    disk:
      name: fleetco-data
      mountPath: /opt/render/project/src/server/data
      sizeGB: 1
    healthCheckPath: /api/public-settings

# HTTPS: Render provisions TLS automatically when custom domains are verified.
# Ensure fleetcomanagement.org + www are added under Settings → Custom Domains.
# APP_ORIGIN / PUBLIC_APP_URL must use https:// (see envVars below).
# The Node app also redirects http→https and www→apex in production.
# 1. Create/link PostgreSQL database "fleetco-db"
# 2. Set DATABASE_URL on fleetco-management (from database Internal Connection String)
# 3. Set JWT_SECRET, DATA_PATH, SEED_DEMO_DATA=false
# Without DATABASE_URL the app runs file-only and data resets on redeploy (see Render logs).
